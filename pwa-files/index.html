<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- ——— PWA: Core meta ——— -->
    <title>Hindi Flashcards — Learn Hindi Vocabulary</title>
    <meta name="description" content="Learn Hindi vocabulary with smart flashcards, audio pronunciation, and spaced repetition. Built for German speakers." />
    <meta name="theme-color" content="#4A8EC2" />

    <!-- ——— PWA: Manifest ——— -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ——— PWA: Icons ——— -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!-- ——— PWA: iOS (Safari) — CRITICAL ——— -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Hindi Cards" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- iOS splash screens (optional but improves UX) -->
    <meta name="format-detection" content="telephone=no" />

    <!-- ——— PWA: Windows ——— -->
    <meta name="msapplication-TileColor" content="#4A8EC2" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />

    <!-- ——— Google Search Console verification ——— -->
    <!-- Replace with your actual verification tag if different -->
    <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE" />

    <!-- ——— PWA: Service Worker Registration ——— -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[PWA] SW registered:', reg.scope))
            .catch(err => console.warn('[PWA] SW registration failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
